<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouvel Enregistrement</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { display: block; width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn-save { background: #e67e22; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Enregistrer un nouvel utilisateur</h2>
        <form action="/admin/enregistrement" method="get">
            <input type="text" name="nom" placeholder="Nom de l'utilisateur" required>
            <input type="text" name="tag" placeholder="ID du Tag RFID" required>
            <input type="number" name="solde" placeholder="Solde initial (€)" step="0.01" required>
            <button type="submit" class="btn-save">Enregistrer</button>
        </form>
        <br>
        <a href="/">Retour à l'accueil</a>
    </div>
</body>
</html>
