<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouvel Enregistrement</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px;}
        input { display: block; width: 90%; padding: 10px; margin: 10px auto; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;}
        .btn-save { background: #e67e22; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 90%; margin-top: 10px; border-radius: 5px;}
        .btn-scan { background: #3498db; color: white; border: none; padding: 10px; cursor: pointer; font-weight: bold; width: 90%; margin: 10px auto; display: block; border-radius: 5px;}
        .btn-scan:hover { background: #2980b9; }
    </style>
</head>
<body>
<div class="card">
    <h2>Nouvel Utilisateur</h2>
    <form action="/admin/enregistrement" method="get">
        <input type="text" name="nom" placeholder="Nom de l'utilisateur" required>

        <button type="button" class="btn-scan" onclick="demanderScan()">1. Scanner la carte</button>
        <input type="text" id="tagInput" name="tag" placeholder="ID du Tag RFID" required readonly>

        <button type="submit" class="btn-save">2. Enregistrer </button>
    </form>
    <br>
    <a href="/">Retour à l'accueil</a>
</div>

<script>
    function demanderScan() {
        const tagInput = document.getElementById('tagInput');
        tagInput.placeholder = "⏳ En attente du badge... ";
        tagInput.value = ""; // 清空之前的数据

        // 向树莓派发送请求，要求开启物理读卡器
        fetch('/api/scan')
            .then(response => {
                if (!response.ok) throw new Error("Erreur serveur");
                return response.text();
            })
            .then(tag => {
                if (tag && tag.trim() !== "") {
                    tagInput.value = tag.trim(); // 自动填入输入框！
                    alert("✅ Carte lue avec succès ! (读卡成功)");
                } else {
                    tagInput.placeholder = "❌ Echec, réessayez (读卡失败)";
                }
            })
            .catch(err => {
                alert("Erreur de connexion au lecteur RFID.");
                tagInput.placeholder = "ID du Tag RFID";
            });
    }
</script>
</body>
</html>
