<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{TITLE}}</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; text-align: center; padding: 50px; }
        .result-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; min-width: 300px; }
        .icon { font-size: 60px; margin-bottom: 20px; }
        h1 { margin: 10px 0; color: #2c3e50; }
        .message { color: #7f8c8d; margin-bottom: 25px; font-size: 1.1em; }
        .details { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: left; margin-bottom: 25px; border-left: 5px solid #3498db; }
        .details.error { border-left-color: #e74c3c; }
        .details.success { border-left-color: #2ecc71; }
        .back-link { display: inline-block; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 0.9em; }
        .back-link:hover { text-decoration: underline; }
        .btn { display: inline-block; padding: 12px 25px; background: #3498db; color: white; text-decoration: none; border-radius: 8px; transition: 0.3s; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="result-card">
        <div class="icon">{{ICON}}</div>
        <h1>{{TITLE}}</h1>
        <p class="message">{{MESSAGE}}</p>
        
        <div class="details {{CLASS}}">
            <p><strong>Utilisateur :</strong> {{USER}}</p>
            <p><strong>Détail :</strong> {{DETAIL}}</p>
            <p><strong>Nouveau Solde :</strong> €{{BALANCE}}</p>
        </div>

        <a href="/" class="back-link">← Retour au Tableau de bord </a>
    </div>
</body>
</html>
