<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Résultat du Paiement</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
        .details { margin: 20px 0; text-align: left; border-top: 1px solid #eee; padding-top: 10px; }
        .btn { display: inline-block; padding: 10px 20px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="{{CLASS}}">{{ICON}} {{TITLE}}</h1>
        <p>{{MESSAGE}}</p>
        
        <div class="details">
            <p>Utilisateur : <b>{{USER}}</b></p>
            <p>Montant : <b>{{AMOUNT}} €</b></p>
            <p>Nouveau Solde : <b style="font-size: 1.2em;">{{BALANCE}} €</b></p>
        </div>

        <a href="/" class="btn">Retour à l'accueil</a>
    </div>
</body>
</html>
