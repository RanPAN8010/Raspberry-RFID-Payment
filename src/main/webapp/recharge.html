<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Recharge de Compte</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px;}
        input { display: block; width: 90%; padding: 10px; margin: 10px auto; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px;}
        .btn-submit { background: #9b59b6; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 90%; margin-top: 15px; font-size: 16px;}
        .btn-submit:hover { background: #8e44ad; }
        .back-link { display: inline-block; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 0.9em; }
        .back-link:hover { text-decoration: underline; }
        .waiting-card { border: 2px solid #3498db; background-color: #ebf5fb; }
        .success-card { border: 2px solid #2ecc71; background-color: #eaeded; }
    </style>
</head>
<body>
<div class="card">
    <h2>Recharge de Solde</h2>
    <form action="/admin/recharge" method="get">

        <input type="text" id="tagInput" class="waiting-card" name="tag" placeholder="⏳ Attente du badge..." required readonly>

        <input type="number" name="amount" placeholder="Montant (€)" step="0.01" required>

        <button type="submit" class="btn-submit">Confirmer le chargement</button>
    </form>
    <br>
    <a href="/" class="back-link">← Retour au Tableau de bord </a>
</div>

<script>
	// Dès que la page est chargée, 
	// exécuter immédiatement la fonction d'écoute automatique
    window.onload = function() {
        ecouterBadgeAutomatique();
    };

    function ecouterBadgeAutomatique() {
        const tagInput = document.getElementById('tagInput');

        // Réutiliser l'API unifiée de scan physique
        fetch('/api/scan')
            .then(response => {
                if (!response.ok) throw new Error("Erreur serveur");
                return response.text();
            })
            .then(tag => {
                if (tag && tag.trim() !== "") {
                    // Remplir les données et changer la couleur du champ en vert
                    tagInput.value = tag.trim();
                    tagInput.classList.remove('waiting-card');
                    tagInput.classList.add('success-card');
                    tagInput.placeholder = "✅ Carte lue !";
                } else {
                    // si rien n'est lu, attendre 1 seconde 
                    // avant de réessayer pour éviter de bloquer le serveur
                    ecouterBadgeAutomatique();
                }
            })
            .catch(err => {
                // En cas de déconnexion ou d'erreur grave,
                // afficher un message et augmenter le délai de réessai
                tagInput.classList.remove('waiting-card');
                tagInput.placeholder = "❌ Connexion perdue.";
            });
    }
</script>
</body>
</html>
