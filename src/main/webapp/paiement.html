<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paiement Manuel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        h2 { color: #c0392b; margin-bottom: 20px; }
        input { display: block; width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-pay { background: #e74c3c; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s; }
        .btn-pay:hover { background: #c0392b; }
        .back-link { display: inline-block; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 0.9em; }
        .back-link:hover { text-decoration: underline; }

        /* 新增：安静等待和成功读取的状态样式 */
        .waiting-card { border: 2px solid #3498db; background-color: #ebf5fb; }
        .success-card { border: 2px solid #2ecc71; background-color: #eaeded; }
    </style>
</head>
<body>
<div class="card">
    <h2>Paiement</h2>
    <p style="color: #7f8c8d; font-size: 0.9em;">Effectuer un débit sur un compte (消费扣款)</p>
    <form action="/pay" method="get">

        <input type="text" id="tagInput" class="waiting-card" name="tag" placeholder="⏳ Attente du badge..." required readonly>

        <input type="number" name="amount" placeholder="Montant à débiter (€)" step="0.01" min="0.01" required>
        <button type="submit" class="btn-pay">Confirmer le Paiement</button>
    </form>
    <a href="/" class="back-link">← Retour au Dashboard</a>
</div>

<script>
    // 网页一加载完毕，就立刻执行自动监听功能
    window.onload = function() {
        ecouterBadgeAutomatique();
    };

    function ecouterBadgeAutomatique() {
        const tagInput = document.getElementById('tagInput');

        // 复用统一的物理刷卡 API
        fetch('/api/scan')
            .then(response => {
                if (!response.ok) throw new Error("Erreur serveur");
                return response.text();
            })
            .then(tag => {
                if (tag && tag.trim() !== "") {
                    // 读到卡号啦！填入数据并改变输入框颜色为绿色
                    tagInput.value = tag.trim();
                    tagInput.classList.remove('waiting-card');
                    tagInput.classList.add('success-card');
                    tagInput.placeholder = "✅ Carte lue !";
                } else {
                    // 🚨 核心优化：如果没读到（或者被幽灵线程拦截），等待 1 秒后再试，防止服务器卡死
                    setTimeout(ecouterBadgeAutomatique, 1000);
                }
            })
            .catch(err => {
                // 如果断网了或发生严重错误，提示并拉长重试时间
                tagInput.classList.remove('waiting-card');
                tagInput.placeholder = "❌ Connexion perdue.";
                setTimeout(ecouterBadgeAutomatique, 3000);
            });
    }
</script>
</body>
</html>
